<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24">
  <!--
    Network Node — Regular hexagon (pointy-top) + center core dot
    Circumradius R=9, center (12,12), inscribed in 18×18 bounding box.
    Vertices at 60° intervals starting from 12 o'clock.
    Core dot: r=1.5 (diameter 3), filled.
  -->
  <polygon
    points="12,3 19.79,7.5 19.79,16.5 12,21 4.21,16.5 4.21,7.5"
    stroke="currentColor"
    fill="none"
    stroke-width="2"
    stroke-linejoin="miter"
  />
  <circle
    cx="12" cy="12" r="1.5"
    fill="currentColor"
    stroke="none"
  />
</svg>
