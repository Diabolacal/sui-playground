<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24">
  <!--
    Turret — Equilateral triangle, side=16, apex up (12 o'clock).
    Centroid at (12,12). Height h = 8√3 ≈ 13.86.
    Centroid-to-apex = 2h/3 ≈ 9.24, centroid-to-base = h/3 ≈ 4.62.
    Default orientation: apex at top. Rotates about (12,12) when
    attached to a Network Node (apex points radially outward).
  -->
  <polygon
    points="12,2.76 20,16.62 4,16.62"
    stroke="currentColor"
    fill="none"
    stroke-width="2"
    stroke-linejoin="miter"
  />
</svg>
