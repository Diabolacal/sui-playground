<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24">
  <!--
    Trade Post (SSU) — Nested squares, both centered at (12,12).
    Outer square: 16×16, stroke-width 2.
    Inner square: 8×8, stroke-width 1.
  -->
  <rect
    x="4" y="4" width="16" height="16"
    stroke="currentColor"
    fill="none"
    stroke-width="2"
    stroke-linejoin="miter"
  />
  <rect
    x="8" y="8" width="8" height="8"
    stroke="currentColor"
    fill="none"
    stroke-width="1"
    stroke-linejoin="miter"
  />
</svg>
