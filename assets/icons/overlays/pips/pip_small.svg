<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24">
  <!--
    Small Status Pip — Compact variant for aggregate glyph contexts
    Used inside Solar System Aggregate containers (§6.14) where
    the standard 4-unit pip is too large relative to the mini glyphs.

    Geometry:
      Center: (18.5, 18.5) — slightly further into corner for mini context
      Radius: 1.5 (diameter 3 units)
      Fill: currentColor
      No stroke

    Pip outer edge: 18.5+1.5 = 20 — within viewBox.
  -->
  <circle
    cx="18.5" cy="18.5" r="1.5"
    fill="currentColor"
    stroke="none"
  />
</svg>
