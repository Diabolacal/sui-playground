<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 8 8" width="8" height="8">
  <!--
    Badge: Revenue — Circle + plus sign (+)
    Renders at gate/SSU NE corner on Toll Collected or Trade Settled.
    Spec §3.3: "$" badge, green, 1.5s hold.

    Symbol choice: "+" instead of "$"
    At 8×8 viewBox (rendered at ~8-12px), a dollar sign requires
    an S-curve + two horizontal strokes — too complex to resolve
    cleanly. A plus mark (+) communicates "value added / positive"
    with just two strokes, and pairs naturally with count badges
    ("+3" pattern). The "$" label in the spec refers to the
    semantic intent (revenue), not a literal dollar sign glyph.

    Geometry:
      Circle: cx=4, cy=4, r=3, stroke-width=1
      Plus horizontal: (2, 4) → (6, 4)
      Plus vertical:   (4, 2) → (4, 6)
      Plus stroke-width=1, linecap=butt
  -->
  <circle
    cx="4" cy="4" r="3"
    stroke="currentColor"
    fill="none"
    stroke-width="1"
  />
  <path
    d="M 2,4 L 6,4 M 4,2 L 4,6"
    stroke="currentColor"
    fill="none"
    stroke-width="1"
    stroke-linecap="butt"
  />
</svg>
